<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TanGhost — Top Gifter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&family=Press+Start+2P&family=Bangers&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

/*
  EL CARD = 100% DEL VIEWPORT
  ─────────────────────────────
  El tamaño lo fija OBS con Ancho/Alto del source.
  No hay padding en body ni sliders de tamaño — lo que
  configures en OBS es exactamente lo que ocupa el card.
  Nunca crece ni encoge por el contenido.
*/
html, body {
  width:  100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent;
  font-family: 'Orbitron', monospace;
}

/* El card LLENA TODO el viewport */
#gifter-card {
  width:  100%;
  height: 100%;
  position: relative;
  border-radius: 16px;
  overflow: hidden;
}

/* ─── TEMAS ─── */
/* Las variables se inyectan vía JS en applyConfig para garantizar
   que apliquen a TODOS los elementos (estado vacío y con gifter) */
:root {
  --accent:  #ffd700;
  --accent2: #ff9800;
  --text:    #fff8dc;
  --sub:     #ffd700;
}

body.theme-gold #gifter-card {
  background: linear-gradient(145deg, rgba(30,20,0,0.93), rgba(60,40,0,0.93));
  border: 2px solid #ffd700;
  box-shadow: 0 0 22px rgba(255,215,0,0.5), inset 0 0 30px rgba(255,215,0,0.06);
}
body.theme-neon #gifter-card {
  background: linear-gradient(145deg, rgba(10,0,30,0.94), rgba(30,0,60,0.94));
  border: 2px solid #bf00ff;
  box-shadow: 0 0 22px rgba(191,0,255,0.55), inset 0 0 30px rgba(191,0,255,0.08);
}
body.theme-fire #gifter-card {
  background: linear-gradient(145deg, rgba(30,5,0,0.94), rgba(60,15,0,0.94));
  border: 2px solid #ff6a00;
  box-shadow: 0 0 22px rgba(255,106,0,0.5), inset 0 0 30px rgba(255,106,0,0.07);
}
body.theme-ice #gifter-card {
  background: linear-gradient(145deg, rgba(0,10,30,0.94), rgba(0,25,50,0.94));
  border: 2px solid #00cfff;
  box-shadow: 0 0 22px rgba(0,207,255,0.45), inset 0 0 30px rgba(0,207,255,0.07);
}

/* ─── Dos estados superpuestos — solo cambia la opacidad ─── */
#g-empty,
#g-content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 16px 18px;
  text-align: center;
  transition: opacity 0.45s ease;
}

/* Estado vacío visible por defecto */
#g-empty   { opacity: 1; }
#g-content { opacity: 0; pointer-events: none; }

#gifter-card.has-gifter #g-empty   { opacity: 0; pointer-events: none; }
#gifter-card.has-gifter #g-content { opacity: 1; pointer-events: auto; }

/* ─── Animaciones ─── */
@keyframes bounceIn {
  0%   { opacity:0; transform: scale(0.6); }
  65%  { transform: scale(1.06); }
  85%  { transform: scale(0.97); }
  100% { opacity:1; transform: scale(1); }
}
@keyframes pulse-glow {
  0%,100% { box-shadow: 0 0 22px color-mix(in srgb, var(--accent) 50%, transparent), inset 0 0 30px color-mix(in srgb, var(--accent) 6%, transparent); }
  50%      { box-shadow: 0 0 45px color-mix(in srgb, var(--accent) 85%, transparent), inset 0 0 40px color-mix(in srgb, var(--accent) 12%, transparent); }
}
@keyframes crown-bounce {
  0%,100% { transform: translateY(0) rotate(-4deg); }
  50%      { transform: translateY(-5px) rotate(4deg); }
}
@keyframes counter-pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.3); }
  100% { transform: scale(1); }
}
@keyframes coin-rain {
  0%   { opacity:1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity:0; transform: translateY(-70px) rotate(360deg) scale(0.3); }
}
@keyframes empty-float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}
@keyframes pulse-text {
  0%,100% { opacity:0.45; letter-spacing:1px; }
  50%      { opacity:1;    letter-spacing:2px; }
}

#gifter-card.animate-in {
  animation: bounceIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
#gifter-card.pulse {
  animation: pulse-glow 1.5s ease-in-out 3;
}

/* ─── Variables de tamaño de textos UI (se inyectan desde popup) ─── */
:root {
  --ui-text-scale: 1.5;  /* default: tamaño cómodo para overlay de OBS */
}

/* ─── Elementos del estado VACÍO ─── */
.g-empty-icon  { font-size: calc(32px * var(--ui-text-scale)); animation: empty-float 2.5s ease-in-out infinite; }
.g-empty-title {
  font-family: 'Orbitron', monospace;
  font-size: calc(13px * var(--ui-text-scale));
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--sub);
}
.g-empty-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: calc(15px * var(--ui-text-scale));
  font-weight: 600;
  line-height: 1.35;
  color: var(--text);
  opacity: 0.7;
}
.g-empty-pulse {
  font-family: 'Orbitron', monospace;
  font-size: calc(10px * var(--ui-text-scale));
  letter-spacing: 1px;
  color: var(--accent);
  animation: pulse-text 2s ease-in-out infinite;
  margin-top: 3px;
}

/* ─── Elementos del estado CON DONADOR ─── */
.g-crown {
  font-size: calc(30px * var(--ui-text-scale));
  animation: crown-bounce 2.2s ease-in-out infinite;
  line-height: 1;
  color: var(--accent);
  text-shadow: 0 0 12px var(--accent);
}
.g-title {
  font-size: calc(11px * var(--ui-text-scale));
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--sub);
  opacity: 0.9;
}
.g-name {
  /* Escala automáticamente con el tamaño del card */
  font-size: var(--name-size, clamp(16px, 4.5vw, 28px));
  font-weight: 900;
  letter-spacing: 1px;
  line-height: 1.1;
  font-family: var(--gifter-font, 'Orbitron', monospace);
  color: var(--text);
  text-shadow: 0 0 10px color-mix(in srgb, var(--accent) 55%, transparent);
  width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.g-thanks {
  font-size: calc(11px * var(--ui-text-scale));
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.85;
}
.g-coins-row {
  display: flex;
  align-items: center;
  gap: 7px;
}
.g-coins-icon { font-size: calc(20px * var(--ui-text-scale)); }
.g-coins {
  font-size: calc(26px * var(--ui-text-scale));
  font-weight: 900;
  color: var(--text);
  text-shadow: 0 0 8px color-mix(in srgb, var(--accent) 50%, transparent);
}
.g-coins.pop { animation: counter-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
.g-bar {
  width: 55%;
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0.7;
  margin-top: 2px;
}

/* ─── Partículas de monedas ─── */
.coin-particle {
  position: fixed;
  font-size: 20px;
  pointer-events: none;
  animation: coin-rain 0.9s ease-out forwards;
  z-index: 9999;
}

</style>
</head>
<body class="theme-gold">

<div id="gifter-card">

  <!-- Estado vacío -->
  <div id="g-empty">
    <div class="g-empty-icon">🎁</div>
    <div class="g-empty-title">¿QUIÉN SERÁ EL #1?</div>
    <div class="g-empty-sub">¡Sé el primero en donar<br>y roba el trono esta sesión!</div>
    <div class="g-empty-pulse">👑 TOP GIFTER DISPONIBLE 👑</div>
  </div>

  <!-- Estado con donador -->
  <div id="g-content">
    <div class="g-crown">👑</div>
    <div class="g-title">🎁 Gifter #1</div>
    <div class="g-name" id="g-name">---</div>
    <div class="g-thanks">¡Muchas gracias!</div>
    <div class="g-coins-row">
      <span class="g-coins-icon">🪙</span>
      <span class="g-coins" id="g-coins">0</span>
    </div>
    <div class="g-bar"></div>
  </div>

</div>

<script>
// ── Config ────────────────────────────────────────────────────
let cfg = {
  gifterTheme:    'gold',
  gifterFont:     'Orbitron, monospace',
  gifterFontSize: 0,
  gifterAnimTime: 0,
  gifterUiScale:  1.5,   // default: tamaño cómodo para overlay OBS
};

// Paleta de colores por tema
const THEMES = {
  gold: { accent: '#ffd700', accent2: '#ff9800', text: '#fff8dc', sub: '#ffd700' },
  neon: { accent: '#bf00ff', accent2: '#00cfff', text: '#f0d0ff', sub: '#e070ff' },
  fire: { accent: '#ff6a00', accent2: '#ffdd00', text: '#ffe8d0', sub: '#ff9944' },
  ice:  { accent: '#00cfff', accent2: '#a0f0ff', text: '#d0f4ff', sub: '#80e8ff' },
};

function applyConfig(raw) {
  if (!raw) return;
  if (raw.gifterTheme    != null) cfg.gifterTheme    = raw.gifterTheme;
  if (raw.gifterFont     != null) cfg.gifterFont     = raw.gifterFont;
  if (raw.gifterFontSize != null) cfg.gifterFontSize = raw.gifterFontSize;
  if (raw.gifterAnimTime != null) cfg.gifterAnimTime = raw.gifterAnimTime;
  if (raw.gifterUiScale  != null) cfg.gifterUiScale  = raw.gifterUiScale;

  // Aplicar clase de tema al body (para background y border del card)
  document.body.className = 'theme-' + cfg.gifterTheme;

  // Inyectar colores del tema en :root para que apliquen a TODOS los elementos
  // (estado vacío y con gifter) sin depender de la cascada CSS
  const palette = THEMES[cfg.gifterTheme] || THEMES.gold;
  const root = document.documentElement;
  root.style.setProperty('--accent',  palette.accent);
  root.style.setProperty('--accent2', palette.accent2);
  root.style.setProperty('--text',    palette.text);
  root.style.setProperty('--sub',     palette.sub);

  // Fuente del nombre
  root.style.setProperty('--gifter-font', cfg.gifterFont);

  // Escala de textos UI
  root.style.setProperty('--ui-text-scale', cfg.gifterUiScale);

  // Tamaño de nombre
  root.style.setProperty(
    '--name-size',
    cfg.gifterFontSize > 0
      ? cfg.gifterFontSize + 'px'
      : 'clamp(16px, 4.5vw, 28px)'
  );
}

// ── Estado del gifter ─────────────────────────────────────────
let topGifter  = null;
let hideTimer  = null;

function updateGifter(username, coinsAdded, topCoins) {
  if (!username) return;
  const wasTopUser = topGifter?.username?.toLowerCase() === username.toLowerCase();
  topGifter = { username, coins: topCoins };
  showGifter(wasTopUser ? 'update' : 'new');
}

function showGifter(mode) {
  const card    = document.getElementById('gifter-card');
  const nameEl  = document.getElementById('g-name');
  const coinsEl = document.getElementById('g-coins');

  nameEl.textContent  = topGifter.username;
  coinsEl.textContent = topGifter.coins.toLocaleString();
  card.classList.add('has-gifter');

  if (mode === 'sync') return;

  if (mode === 'new') {
    card.classList.remove('animate-in', 'pulse');
    void card.offsetWidth;
    card.classList.add('animate-in');
    spawnCoins();
    setTimeout(() => {
      card.classList.remove('animate-in');
      card.classList.add('pulse');
      setTimeout(() => card.classList.remove('pulse'), 4500);
    }, 600);
  } else {
    coinsEl.classList.remove('pop');
    void coinsEl.offsetWidth;
    coinsEl.classList.add('pop');
    spawnCoins(4);
    setTimeout(() => coinsEl.classList.remove('pop'), 400);
    card.classList.add('pulse');
    setTimeout(() => card.classList.remove('pulse'), 4500);
  }

  clearTimeout(hideTimer);
  if (cfg.gifterAnimTime > 0) {
    hideTimer = setTimeout(() => card.classList.remove('has-gifter'), cfg.gifterAnimTime * 1000);
  }
}

function spawnCoins(count = 7) {
  const card = document.getElementById('gifter-card');
  const rect = card.getBoundingClientRect();
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'coin-particle';
    p.textContent = '🪙';
    p.style.left  = (rect.left + Math.random() * rect.width)  + 'px';
    p.style.top   = (rect.top  + Math.random() * rect.height * 0.6) + 'px';
    p.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

// ── WebSocket ─────────────────────────────────────────────────
const WS_URL = 'ws://localhost:7333/recv-gifter';
let ws = null;

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {};
  ws.onmessage = (evt) => {
    try {
      const data = JSON.parse(evt.data);
      if (data.type === 'tg_cfg' && data.cfg) {
        applyConfig(data.cfg);
      } else if (data.type === 'tg_gift' && data.username) {
        if (data.cfg) applyConfig(data.cfg);
        if (data.isSync) {
          topGifter = { username: data.username, coins: data.topCoins };
          showGifter('sync');
        } else {
          updateGifter(data.username, data.coins, data.topCoins);
        }
      }
    } catch(e) {}
  };
  ws.onerror = () => {};
  ws.onclose = () => { setTimeout(connect, 4000); };
}

connect();

// Aplicar config default al arrancar (antes de recibir nada del servidor)
applyConfig(cfg);
</script>
</body>
</html>
